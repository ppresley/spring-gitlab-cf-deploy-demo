name: Gradle Build

on:
  pull_request:
    branches: [main,develop]
  push:
    branches: [main,develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup jdk 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6.4'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*', '**/pom.xml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: build with gradle
        working-directory: ./src
        run: gradle clean bootjar test wrapper
        
